name: Feature Request
description: Suggest an improvement to the Parallax CLI or agent.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Parallax do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety Boundary
      description: How should this preserve research-only, evidence-backed behavior?
    validations:
      required: true
